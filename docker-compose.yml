services:
  3xui-shopbot:
    build: .
    restart: unless-stopped
    ports:
      - '1488:1488'
    volumes:
      # Монтируем исходный код проекта
      - .:/app/project
      # Отдельный том для базы данных (надёжное сохранение)
      - shopbot-db:/app/project/data
      # SSH-ключи для speedtest (создаём директорию и монтируем ключ)
      - ./ssh-keys:/root/.ssh
    container_name: 3xui-shopbot
    extra_hosts:
      # Для доступа к RKN API на хосте из контейнера
      - "host.docker.internal:host-gateway"
    environment:
      - SHOPBOT_DB_PATH=/app/project/data/users.db
      - TZ=Europe/Moscow
      # AUTO_START_BOT управляется через веб-панель (Настройки → Панель → Production режим)

volumes:
  shopbot-db:
