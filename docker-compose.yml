services:
  3xui-shopbot:
    build: .
    restart: unless-stopped
    ports:
      - '1488:1488'
    volumes:
      # Монтируем исходный код проекта
      - .:/app/project
      # Отдельный том для базы данных (надёжное сохранение)
      - shopbot-db:/app/project/data
      # SSH-ключи для speedtest (создаём директорию и монтируем ключ)
      - ./ssh-keys:/root/.ssh
    container_name: 3xui-shopbot
    environment:
      - SHOPBOT_DB_PATH=/app/project/data/users.db
      # AUTO_START_BOT=true  # Раскомментируйте для автозапуска бота при старте контейнера

volumes:
  shopbot-db:
