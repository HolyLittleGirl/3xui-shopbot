services:
  3xui-shopbot:
    build: .
    restart: unless-stopped
    ports:
      - '1488:1488'
    volumes:
      # Монтируем исходный код проекта
      - .:/app/project
      # Отдельный том для базы данных (надёжное сохранение)
      - shopbot-db:/app/project/data
      # SSH-ключи для speedtest
      - ./ssh-keys:/root/.ssh
      # RKN данные (логи)
      - /var/log/rkn-blocker:/var/log/rkn-blocker
      # RKN токен
      - /etc/rkn-blocker.env:/etc/rkn-blocker.env:ro
    container_name: 3xui-shopbot
    environment:
      - SHOPBOT_DB_PATH=/app/project/data/users.db
      - TZ=Europe/Moscow
      # RKN API внутри контейнера
      - RKN_API_HOST=127.0.0.1
      # AUTO_START_BOT управляется через веб-панель
      - AUTO_START_BOT=true
    # Запускаем RKN API + основной бот
    command: >
      sh -c "/app/.venv/bin/python3 /app/project/rkn-blocker-inside/rkn_api.py --port 8765 --host 127.0.0.1 &
             sleep 2 &&
             python3 -m shop_bot"

volumes:
  shopbot-db:
