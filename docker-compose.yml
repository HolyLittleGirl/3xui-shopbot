services:
  3xui-shopbot:
    build: .
    restart: unless-stopped
    ports:
      - '1488:1488'
    volumes:
      - .:/app/project
      - shopbot-db:/app/project/data
      - ./ssh-keys:/root/.ssh
      # RKN блокировщик (только для чтения)
      - /opt/rkn-blocker:/host-rkn-blocker:ro
      - /etc/rkn-blocker.env:/etc/rkn-blocker.env:ro
    container_name: 3xui-shopbot
    cap_add:
      - NET_ADMIN      # Для iptables/ipset
      - NET_RAW        # Для сетевых операций
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SHOPBOT_DB_PATH=/app/project/data/users.db
      - TZ=Europe/Moscow
      - RKN_API_HOST=host.docker.internal
      - AUTO_START_BOT=true

volumes:
  shopbot-db:
